name: Code quality checks

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review

jobs:
  ruff:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: astral-sh/ruff-action@v3
        with:
          args: "format --check --diff"
      - uses: astral-sh/ruff-action@v3
        with:
          args: "check"

  type-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          path: quiz-tests

      - uses: actions/setup-python@v6
        with:
          python-version: '3.13'

      - uses: astral-sh/setup-uv@v7

      - name: Use CI-specific pyproject
        working-directory: quiz-tests
        run: |
          mv pyproject.toml pyproject.local.toml
          cp pyproject.ci.toml pyproject.toml
          uv tool install ty
          uv run ty check
