[project]
name = "quiz-tests"
version = "0.1.0"
description = "Integration and end-to-end tests for the quiz-cli project"
readme = "README.md"
license = {text = "MIT"}
requires-python = ">=3.13"
dependencies = [
    "pytest>=8.0",
    "pytest-asyncio>=0.25",
    "pytest-timeout>=2.3",
    "httpx>=0.28",
    "httpx-ws>=0.7",
    "ruamel-yaml>=0.18",
    "pydantic>=2.12",
    "quiz-common",
    "quiz-server",
]

[tool.uv.sources]
quiz-common = { git = "https://github.com/quiz-cli/quiz-common.git" }
quiz-server = { git = "https://github.com/quiz-cli/quiz-server.git" }

[tool.uv]
override-dependencies = [
    "quiz-common",
]

[dependency-groups]
dev = [
    "ruff>=0.14.10",
    "ty>=0.0.29",
]

[tool.pytest.ini_options]
asyncio_mode = "auto"
timeout = 10

[tool.ruff.lint]
select = ["ALL"]
ignore = [
    "D203",
    "D212",
    "COM812",
]

[tool.ruff.lint.per-file-ignores]
"tests/*" = ["ALL"]
